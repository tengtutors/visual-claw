<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Visual Claw — Interior Design</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117; color: #e0e0e0; font-family: 'Courier New', monospace;
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ── Left: Catalog Panel ── */
  #catalog-panel {
    width: 240px; flex-shrink: 0; background: #161b22;
    border-right: 2px solid #21262d; display: flex; flex-direction: column;
    overflow: hidden;
  }
  #catalog-header {
    padding: 12px; background: #1a1f35; border-bottom: 1px solid #21262d;
    font-size: 14px; font-weight: bold; color: #58a6ff;
  }
  #catalog-header small { display: block; font-size: 10px; color: #555; font-weight: normal; margin-top: 4px; }
  .cat-section { padding: 8px 10px 4px; font-size: 11px; color: #8b949e; font-weight: bold; }
  #catalog-list {
    flex: 1; overflow-y: auto; padding-bottom: 10px;
  }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #0d1117;
    transition: background 0.15s;
  }
  .cat-item:hover { background: #1f2937; }
  .cat-item.selected { background: #1a3a2a; border-left: 3px solid #3fb950; }
  .cat-item canvas { image-rendering: pixelated; flex-shrink: 0; }
  .cat-item-info { flex: 1; min-width: 0; }
  .cat-item-name { font-size: 12px; color: #c9d1d9; }
  .cat-item-size { font-size: 9px; color: #555; }
  .cat-item-tag {
    font-size: 8px; padding: 1px 5px; border-radius: 3px; margin-top: 2px;
    display: inline-block;
  }
  .tag-interactive { background: #1a3a2a; color: #3fb950; }
  .tag-decorative { background: #1a1f35; color: #58a6ff; }

  /* ── Center: Map ── */
  #map-area {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; overflow: auto; position: relative;
  }
  #map-wrap { position: relative; display: inline-block; }
  #map {
    image-rendering: pixelated; cursor: default;
    border: 2px solid #21262d; border-radius: 4px;
  }
  #tooltip {
    position: fixed; background: #1a1f35; border: 1px solid #3fb950;
    color: #c9d1d9; font-size: 11px; padding: 4px 8px; border-radius: 4px;
    pointer-events: none; display: none; z-index: 100; white-space: nowrap;
  }

  /* ── Right: Properties Panel ── */
  #props-panel {
    width: 220px; flex-shrink: 0; background: #161b22;
    border-left: 2px solid #21262d; display: flex; flex-direction: column;
    overflow-y: auto;
  }
  #props-header {
    padding: 12px; background: #1a1f35; border-bottom: 1px solid #21262d;
    font-size: 13px; font-weight: bold; color: #da8;
  }
  .prop-section { padding: 10px 12px; border-bottom: 1px solid #21262d; }
  .prop-label { font-size: 10px; color: #8b949e; margin-bottom: 4px; }
  .prop-value { font-size: 12px; color: #c9d1d9; }
  .prop-row { display: flex; gap: 6px; margin-top: 6px; }
  .prop-input {
    background: #0d1117; border: 1px solid #333; color: #e0e0e0;
    font-family: monospace; font-size: 12px; padding: 4px 6px;
    border-radius: 3px; width: 70px;
  }

  /* ── Bottom toolbar ── */
  #toolbar {
    position: fixed; bottom: 0; left: 240px; right: 220px;
    background: #161b22; border-top: 2px solid #21262d;
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 8px; z-index: 50;
  }
  .tb-btn {
    background: #21262d; color: #c9d1d9; border: 1px solid #333;
    padding: 6px 16px; font-family: monospace; font-size: 12px;
    cursor: pointer; border-radius: 4px; transition: all 0.15s;
  }
  .tb-btn:hover { background: #30363d; }
  .tb-btn.active { background: #1a3a2a; border-color: #3fb950; color: #3fb950; }
  .tb-btn.danger { border-color: #f85149; }
  .tb-btn.danger:hover { background: #3a1a1a; color: #f85149; }
  .tb-btn.primary { background: #1f6feb; border-color: #58a6ff; color: #fff; }
  .tb-btn.primary:hover { background: #388bfd; }

  #status-bar {
    position: fixed; bottom: 44px; left: 240px; right: 220px;
    background: rgba(13,17,23,0.9); color: #555; font-size: 10px;
    padding: 4px 12px; text-align: center; z-index: 49;
  }
  #mode-badge {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    background: #3fb950; color: #000; padding: 4px 16px; font-size: 12px;
    font-weight: bold; border-radius: 4px; z-index: 100; display: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>

// ── Build Catalog UI ──
function buildCatalog() {
  const list = document.getElementById('catalog-list');
  let lastCat = '';
  for (const item of CATALOG) {
    if (item.category !== lastCat) {
      lastCat = item.category;
      const sec = document.createElement('div');
      sec.className = 'cat-section';
      sec.textContent = item.category;
      list.appendChild(sec);
    }
    const div = document.createElement('div');
    div.className = 'cat-item';
    div.dataset.name = item.name;

    // Thumbnail
    const thumb = document.createElement('canvas');
    const tScale = Math.min(3, 40 / Math.max(item.src.w, item.src.h));
    thumb.width = item.src.w * tScale;
    thumb.height = item.src.h * tScale;
    const tctx = thumb.getContext('2d');
    tctx.imageSmoothingEnabled = false;
    tctx.drawImage(tileset, item.src.x, item.src.y, item.src.w, item.src.h,
      0, 0, thumb.width, thumb.height);

    const info = document.createElement('div');
    info.className = 'cat-item-info';
    let tags = '';
    if (item.interactive) {
      tags = `<span class="cat-item-tag tag-interactive">interactive</span>`;
    }
    info.innerHTML = `
      <div class="cat-item-name">${item.name}</div>
      <div class="cat-item-size">${item.src.w}×${item.src.h}px</div>
      ${tags}
    `;

    div.appendChild(thumb);
    div.appendChild(info);
    div.addEventListener('click', () => selectCatalogItem(item, div));
    list.appendChild(div);
  }
}

function selectCatalogItem(item, el) {
  document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('selected'));
  if (selectedCatalogItem === item) {
    selectedCatalogItem = null;
    document.getElementById('mode-badge').style.display = 'none';
    mapCanvas.style.cursor = 'default';
    return;
  }
  selectedCatalogItem = item;
  el.classList.add('selected');
  document.getElementById('mode-badge').style.display = 'block';
  document.getElementById('mode-badge').textContent = `PLACING: ${item.name} — click on map`;
  mapCanvas.style.cursor = 'crosshair';
  selectedPlacedItem = null;
  updateProps();
}

    <div class="prop-section">
      <div class="prop-label">Size</div>
      <div class="prop-value">${item.src.w}×${item.src.h}px (${Math.round(item.src.w*SCALE)}×${Math.round(item.src.h*SCALE)} scaled)</div>
    </div>
    <div class="prop-section">
      <div class="prop-label">Collision</div>
      <div class="prop-value">${item.hasCollision ? 'Yes — blocks movement' : 'No — walk-through'}</div>
    </div>
    <div class="prop-section">
      <div class="prop-label">Interactive Action</div>
      <div class="prop-value">${item.interactive || 'None'}</div>
    </div>
    <div class="prop-section">
      <div class="prop-label">Flip</div>
      <div class="prop-row">
        <button class="tb-btn" style="padding:3px 10px;font-size:11px" onclick="flipSelected()">
          ${item.flipped ? '↩ Unflip' : '↔ Flip Horizontal'}
        </button>
      </div>
    </div>
    <div class="prop-section">
      <button class="tb-btn danger" style="width:100%;padding:6px" onclick="deleteSelected()">Delete This Piece</button>
    </div>
  `;
}

function moveSelected(x, y) {
  if (!selectedPlacedItem) return;
  saveUndo();
  selectedPlacedItem.x = parseInt(x);
  selectedPlacedItem.y = parseInt(y);
  updateProps();
}

function flipSelected() {
  if (!selectedPlacedItem) return;
  saveUndo();
  selectedPlacedItem.flipped = !selectedPlacedItem.flipped;
  updateProps();
}

function deleteSelected() {
  if (!selectedPlacedItem) return;
  saveUndo();
  placedItems = placedItems.filter(i => i !== selectedPlacedItem);
  selectedPlacedItem = null;
  updateProps();
}

// ── Drawing ──
function worldToCanvas(wx, wy) { return { x: wx * VS, y: wy * VS }; }
function canvasToWorld(cx, cy) { return { x: cx / VS, y: cy / VS }; }

function drawMap() {
  mapCtx.imageSmoothingEnabled = false;
  mapCtx.fillStyle = '#0d1117';
  mapCtx.fillRect(0, 0, MAP_W, MAP_H);
  if (!tileset) { requestAnimationFrame(drawMap); return; }

  // Floor
  const floorSrc = { x: 64, y: 224, w: 32, h: 32 };
  for (let r = 0; r < ROOM_ROWS; r++) {
    for (let c = 0; c < ROOM_COLS; c++) {
      const isWall = r < 3 || r >= ROOM_ROWS - 1 || c === 0 || c === ROOM_COLS - 1;
      if (isWall) continue;
      const wx = ROOM_OX + c * ST, wy = ROOM_OY + r * ST;
      const p = worldToCanvas(wx, wy);
      mapCtx.drawImage(tileset, floorSrc.x, floorSrc.y, floorSrc.w, floorSrc.h,
        p.x, p.y, ST * VS, ST * VS);
    }
  }

  // Grid lines
  mapCtx.strokeStyle = 'rgba(255,255,255,0.04)';
  mapCtx.lineWidth = 0.5;
  for (let r = 3; r <= ROOM_ROWS - 1; r++) {
    const y = (ROOM_OY + r * ST) * VS;
    mapCtx.beginPath();
    mapCtx.moveTo((ROOM_OX + ST) * VS, y);
    mapCtx.lineTo((ROOM_OX + (ROOM_COLS - 1) * ST) * VS, y);
    mapCtx.stroke();
  }
  for (let c = 1; c <= ROOM_COLS - 1; c++) {
    const x = (ROOM_OX + c * ST) * VS;
    mapCtx.beginPath();
    mapCtx.moveTo(x, (ROOM_OY + 3 * ST) * VS);
    mapCtx.lineTo(x, (ROOM_OY + (ROOM_ROWS - 1) * ST) * VS);
    mapCtx.stroke();
  }

  // Placed items sorted by y (items without collision first for z-order, then by y)
  const sorted = [...placedItems].sort((a, b) => {
    // Items on tables (no collision) get high z
    const az = a.hasCollision === false ? 900 : a.y + a.src.h * SCALE;
    const bz = b.hasCollision === false ? 900 : b.y + b.src.h * SCALE;
    return az - bz;
  });

  for (const item of sorted) {
    const p = worldToCanvas(item.x, item.y);
    const sw = item.src.w * SCALE * VS;
    const sh = item.src.h * SCALE * VS;

    mapCtx.save();
    if (item.flipped) {
      mapCtx.translate(p.x + sw, p.y);
      mapCtx.scale(-1, 1);
      mapCtx.drawImage(tileset, item.src.x, item.src.y, item.src.w, item.src.h, 0, 0, sw, sh);
    } else {
      mapCtx.drawImage(tileset, item.src.x, item.src.y, item.src.w, item.src.h, p.x, p.y, sw, sh);
    }
    mapCtx.restore();

    // Highlight selected
    if (item === selectedPlacedItem) {
      mapCtx.strokeStyle = '#3fb950';
      mapCtx.lineWidth = 2;
      mapCtx.setLineDash([4, 4]);
      mapCtx.strokeRect(p.x, p.y, sw, sh);
      mapCtx.setLineDash([]);
    }
    // Highlight dragging
    if (item === dragItem) {
      mapCtx.strokeStyle = '#58a6ff';
      mapCtx.lineWidth = 2;
      mapCtx.strokeRect(p.x, p.y, sw, sh);
    }
    // Show collision bounds
    if (item === selectedPlacedItem && item.hasCollision) {
      mapCtx.fillStyle = 'rgba(255,100,100,0.15)';
      mapCtx.fillRect(p.x, p.y, sw, sh);
    }
  }

  // Delete mode overlay
  if (deleteMode) {
    mapCtx.fillStyle = 'rgba(248,81,73,0.08)';
    mapCtx.fillRect(0, 0, MAP_W, MAP_H);
  }

  requestAnimationFrame(drawMap);
}

// ── Map Interaction ──
function hitTest(wx, wy) {
  for (let i = placedItems.length - 1; i >= 0; i--) {
    const item = placedItems[i];
    const iw = item.src.w * SCALE, ih = item.src.h * SCALE;
    if (wx >= item.x && wx <= item.x + iw && wy >= item.y && wy <= item.y + ih) {
      return item;
    }
  }
  return null;
}

const tooltip = document.getElementById('tooltip');

mapCanvas.addEventListener('mousemove', (e) => {
  const rect = mapCanvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const w = canvasToWorld(cx, cy);

  document.getElementById('status-bar').textContent =
    `Position: ${Math.round(w.x)}, ${Math.round(w.y)}` +
    (deleteMode ? '  |  DELETE MODE — click to remove' : '') +
    (selectedCatalogItem ? `  |  Placing: ${selectedCatalogItem.name}` : '');

  if (dragItem) {
    dragItem.x = Math.round(w.x - dragOffX);
    dragItem.y = Math.round(w.y - dragOffY);
    updateProps();
    return;
  }

  const hit = hitTest(w.x, w.y);
  if (hit) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
    tooltip.textContent = `${hit.cat || hit.id} (${hit.x}, ${hit.y})`;
    mapCanvas.style.cursor = deleteMode ? 'not-allowed' : 'grab';
  } else {
    tooltip.style.display = 'none';
    mapCanvas.style.cursor = selectedCatalogItem ? 'crosshair' : 'default';
  }
});

mapCanvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

mapCanvas.addEventListener('mousedown', (e) => {
  if (e.button === 2) return;
  const rect = mapCanvas.getBoundingClientRect();
  const w = canvasToWorld(e.clientX - rect.left, e.clientY - rect.top);

  const hit = hitTest(w.x, w.y);

  // Delete mode
  if (deleteMode && hit) {
    saveUndo();
    placedItems = placedItems.filter(i => i !== hit);
    if (selectedPlacedItem === hit) selectedPlacedItem = null;
    updateProps();
    return;
  }

  // Click existing item → select or drag (always prioritize existing items)
  if (hit) {
    selectedPlacedItem = hit;
    dragItem = hit;
    dragOffX = w.x - hit.x;
    dragOffY = w.y - hit.y;
    saveUndo();
    updateProps();
    return;
  }

  // Place new from catalog (only on empty space)
  if (selectedCatalogItem) {
    saveUndo();
    const newItem = {
      id: selectedCatalogItem.name.toLowerCase().replace(/\s+/g, '_') + '_' + Date.now(),
      cat: selectedCatalogItem.name,
      src: { ...selectedCatalogItem.src },
      x: Math.round(w.x - (selectedCatalogItem.src.w * SCALE / 2)),
      y: Math.round(w.y - (selectedCatalogItem.src.h * SCALE / 2)),
      hasCollision: selectedCatalogItem.hasCollision,
      interactive: selectedCatalogItem.interactive || null,
      flipped: false,
    };
    placedItems.push(newItem);
    selectedPlacedItem = newItem;
    // Auto-clear catalog selection after placing
    selectedCatalogItem = null;
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('selected'));
    document.getElementById('mode-badge').style.display = 'none';
    mapCanvas.style.cursor = 'default';
    updateProps();
    return;
  }

  // Click empty → deselect
  selectedPlacedItem = null;
  updateProps();
});

mapCanvas.addEventListener('mouseup', () => {
  dragItem = null;
});

mapCanvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const rect = mapCanvas.getBoundingClientRect();
  const w = canvasToWorld(e.clientX - rect.left, e.clientY - rect.top);
  const hit = hitTest(w.x, w.y);
  if (hit) {
    saveUndo();
    placedItems = placedItems.filter(i => i !== hit);
    if (selectedPlacedItem === hit) selectedPlacedItem = null;
    updateProps();
  }
});

// ── Toolbar Actions ──
function toggleDeleteMode() {
  deleteMode = !deleteMode;
  document.getElementById('btn-delete').classList.toggle('active', deleteMode);
  if (deleteMode) {
    selectedCatalogItem = null;
    document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('selected'));
    document.getElementById('mode-badge').style.display = 'block';
    document.getElementById('mode-badge').textContent = 'DELETE MODE — click items to remove';
    document.getElementById('mode-badge').style.background = '#f85149';
  } else {
    document.getElementById('mode-badge').style.display = 'none';
    document.getElementById('mode-badge').style.background = '#3fb950';
  }
}

function saveUndo() {
  undoStack.push(JSON.parse(JSON.stringify(placedItems)));
  if (undoStack.length > 50) undoStack.shift();
}

function undoLast() {
  if (undoStack.length === 0) return;
  placedItems = undoStack.pop();
  selectedPlacedItem = null;
  updateProps();
}

function clearAll() {
  if (!confirm('Remove all furniture?')) return;
  saveUndo();
  placedItems = [];
  selectedPlacedItem = null;
  updateProps();
}

function loadDefaults() {
  saveUndo();
  placedItems = DEFAULT_LAYOUT.map(item => ({
    ...item,
    src: { ...item.src },
    interactive: item.interactive || null,
    flipped: Boolean(item.flipped),
  }));
  selectedPlacedItem = null;
  updateProps();
}

async function loadInitialLayout() {
  try {
    const response = await fetch(OFFICE_LAYOUT_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(String(response.status));
    const data = await response.json();
    if (!Array.isArray(data)) throw new Error('Expected array');
    placedItems = data.map(item => ({
      id: item.id || 'imported_' + Date.now(),
      cat: item.cat || item.id,
      src: item.src,
      x: item.x,
      y: item.y,
      hasCollision: item.hasCollision !== false,
      interactive: item.interactive || null,
      flipped: item.flipped || false,
    }));
    selectedPlacedItem = null;
    updateProps();
    document.getElementById('status-bar').textContent = `Loaded ${data.length} items from office-layout.json`;
  } catch {
    loadDefaults();
    document.getElementById('status-bar').textContent = 'Loaded default layout';
  }
}

function exportJSON() {
  const output = placedItems.map(item => ({
    id: item.id,
    cat: item.cat,
    src: item.src,
    x: item.x,
    y: item.y,
    hasCollision: item.hasCollision,
    interactive: item.interactive || null,
    flipped: item.flipped || false,
  }));
  const json = JSON.stringify(output, null, 2);

  fetch(OFFICE_LAYOUT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: json,
  })
    .then((response) => {
      if (!response.ok) throw new Error(`Save failed: ${response.status}`);
      return navigator.clipboard.writeText(json).catch(() => {});
    })
    .then(() => {
      document.getElementById('status-bar').textContent = `Saved ${output.length} items to office-layout.json`;
    })
    .catch(() => {
      navigator.clipboard.writeText(json).then(() => {
        document.getElementById('status-bar').textContent = 'Save failed — JSON copied to clipboard instead';
      }).catch(() => {
        prompt('Copy this JSON:', json);
      });
    });
}

function importJSON() {
  const json = prompt('Paste furniture layout JSON:');
  if (!json) return;
  try {
    const data = JSON.parse(json);
    if (!Array.isArray(data)) throw new Error('Expected array');
    saveUndo();
    placedItems = data.map(item => ({
      id: item.id || 'imported_' + Date.now(),
      cat: item.cat || item.id,
      src: item.src,
      x: item.x,
      y: item.y,
      hasCollision: item.hasCollision !== false,
      interactive: item.interactive || null,
      flipped: item.flipped || false,
    }));
    selectedPlacedItem = null;
    updateProps();
    document.getElementById('status-bar').textContent = `Imported ${data.length} items`;
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
  }
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedPlacedItem && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      deleteSelected();
    }
  }
  if (e.key === 'Escape') {
    selectedCatalogItem = null;
    selectedPlacedItem = null;
    deleteMode = false;
    document.getElementById('btn-delete').classList.remove('active');
    document.getElementById('mode-badge').style.display = 'none';
    document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('selected'));
    mapCanvas.style.cursor = 'default';
    updateProps();
  }
  if (e.ctrlKey && e.key === 'z') {
    e.preventDefault();
    undoLast();
  }
  if (e.key === 'f' && selectedPlacedItem && document.activeElement.tagName !== 'INPUT') {
    flipSelected();
  }
});

// Start
drawMap();
updateProps();
</script>
</body>
</html>
